name: DamnWrapper32 CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build and Package APK
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Raw Console Build (No Gradle)
      run: |
        set -e
        
        echo "=== 0. Install legacy system libraries for NDK r17c ==="
        sudo apt-get update
        # Пытаемся поставить пакет легально (в 22.04 он еще бывает в universe)
        sudo apt-get install -y libncurses5 libtinfo5 || true
        
        # Хак: Если старых библиотек нет, привязываем современные libtinfo6/libncurses6 к именам 5-й версии.
        # Для старого Android NDK это работает безотказно.
        sudo ln -sf /usr/lib/x86_64-linux-gnu/libtinfo.so.6 /usr/lib/x86_64-linux-gnu/libtinfo.so.5 || true
        sudo ln -sf /usr/lib/x86_64-linux-gnu/libncurses.so.6 /usr/lib/x86_64-linux-gnu/libncurses.so.5 || true
        
        echo "=== 1. Setup Build Environment ==="
        export SDK=$ANDROID_SDK_ROOT
        export BUILD_TOOLS=$(ls -d $SDK/build-tools/* | sort -V | tail -1)
        export PLATFORM_VERSION=33 
        export PLATFORM=$SDK/platforms/android-$PLATFORM_VERSION

        if [ ! -d "$PLATFORM" ]; then
          echo "Installing android-$PLATFORM_VERSION platform..."
          $SDK/cmdline-tools/latest/bin/sdkmanager "platforms;android-$PLATFORM_VERSION" > /dev/null
        fi
        
        echo "=== 1.5. Download and Setup NDK r17c ==="
        wget -q https://dl.google.com/android/repository/android-ndk-r17c-linux-x86_64.zip
        unzip -q android-ndk-r17c-linux-x86_64.zip
        export NDK=$PWD/android-ndk-r17c

        echo "Using Build Tools: $BUILD_TOOLS"
        echo "Using NDK: $NDK"

        mkdir -p build/gen build/obj build/apk build/apk_libs/lib/armeabi-v7a build/res

        echo "=== 2. NDK Build ==="
        $NDK/ndk-build NDK_PROJECT_PATH=. \
          APP_BUILD_SCRIPT=src/jni/Android.mk \
          NDK_APPLICATION_MK=src/jni/Application.mk \
          NDK_OUT=./build/ndk-obj \
          NDK_LIBS_OUT=./build/apk_libs/lib

        echo "=== 3. Compile Resources (AAPT2) ==="
        $BUILD_TOOLS/aapt2 compile --dir res -o build/res.zip
        $BUILD_TOOLS/aapt2 link -I $PLATFORM/android.jar \
          --manifest AndroidManifest.xml \
          -A assets \
          build/res.zip \
          --java build/gen \
          -o build/app-unaligned.apk

        echo "=== 4. Compile Java ==="
        find src/java -name "*.java" > build/java_sources.txt
        find build/gen -name "*.java" >> build/java_sources.txt
        
        javac -source 1.8 -target 1.8 \
          -bootclasspath $PLATFORM/android.jar \
          -cp build/gen \
          -d build/obj \
          @build/java_sources.txt

        echo "=== 5. Dexing (D8) ==="
        cd build/obj
        $BUILD_TOOLS/d8 --release --lib $PLATFORM/android.jar --output ../apk/ $(find . -name "*.class")
        cd ../..

        echo "=== 6. Package Final APK ==="
        cp build/app-unaligned.apk build/app-with-code.apk
        
        cd build/apk
        zip -qj ../app-with-code.apk classes.dex
        cd ../..
        
        cd build/apk_libs
        zip -qr ../app-with-code.apk lib/
        cd ../..

        echo "=== 7. Zipalign ==="
        $BUILD_TOOLS/zipalign -p -f 4 build/app-with-code.apk build/app-aligned.apk

        echo "=== 8. Sign APK ==="
        keytool -genkeypair -v -keystore build/debug.keystore \
          -alias androiddebugkey -keypass android -storepass android \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -dname "CN=DamnWrapper,O=XaView,C=RU"

        $BUILD_TOOLS/apksigner sign \
          --ks build/debug.keystore \
          --ks-pass pass:android \
          --out DamnWrapper32_ARMv7.apk \
          build/app-aligned.apk

    - name: Upload Output APK
      uses: actions/upload-artifact@v4
      with:
        name: DamnWrapper32-APK
        path: DamnWrapper32_ARMv7.apk
